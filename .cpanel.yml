---
deployment:
  tasks:
    # 1. Criar pasta pública e copiar arquivos de public/
    - mkdir -p /home/fionco36/public_html/sistemadegestao
    - cp -rf /home/fionco36/erp_app/public/. /home/fionco36/public_html/sistemadegestao/

    # 3. Substituir index.php pelo modificado (aponta para ~/erp_app)
    - cp /home/fionco36/erp_app/deploy/server_index.php /home/fionco36/public_html/sistemadegestao/index.php

    # 4. Configurar .env (só na primeira vez)
    - test -f /home/fionco36/erp_app/.env || cp /home/fionco36/erp_app/.env.production /home/fionco36/erp_app/.env

    # 5. Permissões de escrita
    - chmod -R 775 /home/fionco36/erp_app/storage /home/fionco36/erp_app/bootstrap/cache

    # 6. Symlink storage -> public
    - rm -rf /home/fionco36/public_html/sistemadegestao/storage
    - ln -sf /home/fionco36/erp_app/storage/app/public /home/fionco36/public_html/sistemadegestao/storage

    # 7. Gerar APP_KEY (só se ainda não foi gerado)
    - /usr/local/bin/php8.3 /home/fionco36/erp_app/artisan key:generate --force

    # 8. Rodar migrations
    - /usr/local/bin/php8.3 /home/fionco36/erp_app/artisan migrate --force

    # 9. Otimizar para produção
    - /usr/local/bin/php8.3 /home/fionco36/erp_app/artisan config:cache
    - /usr/local/bin/php8.3 /home/fionco36/erp_app/artisan route:cache
    - /usr/local/bin/php8.3 /home/fionco36/erp_app/artisan view:cache
